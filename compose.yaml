services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: sqlcomp
      MYSQL_PASSWORD: sqlcomp
      MYSQL_ROOT_PASSWORD: sqlcomp_root
      MYSQL_USER: sqlcomp
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=sqlcomp mysql --protocol=TCP -h 127.0.0.1 -usqlcomp --database=sqlcomp --execute='SELECT 1' --silent",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
      - ./fixtures/mysql/init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql-data:
