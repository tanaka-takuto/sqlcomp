services:
  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_DATABASE: sqlay
      MYSQL_PASSWORD: sqlay
      MYSQL_ROOT_PASSWORD: sqlay_root
      MYSQL_USER: sqlay
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=sqlay mysql --protocol=TCP -h 127.0.0.1 -usqlay --database=sqlay --execute='SELECT 1' --silent",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
