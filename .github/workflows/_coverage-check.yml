name: "[coverage] Check (Reusable Workflow)"

on:
  workflow_call:
    inputs:
      cargo-llvm-cov-version:
        description: cargo-llvm-cov version used by CI.
        required: false
        type: string
        default: 0.8.7

permissions:
  actions: write
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Rust coverage ratchet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Rust coverage tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked --version "${{ inputs.cargo-llvm-cov-version }}"

      - name: Run coverage gate
        run: script/check-coverage.sh

      - name: Comment coverage report
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9
