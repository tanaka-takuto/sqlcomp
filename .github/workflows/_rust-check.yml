name: "[rust] Check (Reusable Workflow)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  rust:
    name: Rust fmt, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Check repository structure
        run: script/check-structure.sh

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Rust lint
        run: cargo clippy --locked --workspace --all-targets --all-features

      - name: Run Rust tests
        run: cargo test --locked --workspace --all-targets --all-features
