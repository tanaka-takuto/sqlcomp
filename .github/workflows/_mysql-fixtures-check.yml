name: "[mysql-fixtures] Check (Reusable Workflow)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  mysql-fixtures:
    name: MySQL fixture checks
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: sqlay
          MYSQL_PASSWORD: sqlay
          MYSQL_ROOT_PASSWORD: sqlay_root
          MYSQL_USER: sqlay
        ports:
          - 3306:3306
        options: >-
          --health-cmd="MYSQL_PWD=sqlay mysql --protocol=TCP -h 127.0.0.1 -usqlay
          --database=sqlay --execute='SELECT 1' --silent"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=30s
    env:
      DATABASE_URL: mysql://sqlay:sqlay@127.0.0.1:3306/sqlay
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes default-mysql-client

      - name: Run MySQL fixture checks
        run: script/check-mysql-fixtures.sh
