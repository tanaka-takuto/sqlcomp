name: "[mysql] Integration (Reusable Workflow)"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  mysql:
    name: MySQL-backed integration tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: sqlcomp
          MYSQL_PASSWORD: sqlcomp
          MYSQL_ROOT_PASSWORD: sqlcomp_root
          MYSQL_USER: sqlcomp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="MYSQL_PWD=sqlcomp mysql --protocol=TCP -h 127.0.0.1 -usqlcomp
          --database=sqlcomp --execute='SELECT 1' --silent"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=30s
    env:
      DATABASE_URL: mysql://sqlcomp:sqlcomp@127.0.0.1:3306/sqlcomp
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Load MySQL fixtures
        run: |
          docker exec -i -e MYSQL_PWD=sqlcomp_root "${{ job.services.mysql.id }}" \
            mysql --protocol=TCP -h 127.0.0.1 -uroot \
            --execute="DROP DATABASE IF EXISTS sqlcomp"

          for fixture in fixtures/mysql/init/*.sql; do
            docker exec -i -e MYSQL_PWD=sqlcomp_root "${{ job.services.mysql.id }}" \
              mysql --protocol=TCP -h 127.0.0.1 -uroot \
              < "$fixture"
          done

      - name: Run MySQL integration tests
        run: script/mysql-integration.sh
